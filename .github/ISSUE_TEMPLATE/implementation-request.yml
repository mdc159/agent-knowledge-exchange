name: Implementation Request
description: Request code, docs, workflow, or configuration work through the standard Linear-first flow.
title: "[work] "
labels:
  - agent-work
  - needs-review
body:
  - type: input
    id: linear
    attributes:
      label: Linear issue
      description: Use the Linear ID or URL, for example 121-123.
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Target repository
      description: Repository that should receive the work.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this work is complete?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks, behavior, docs, or review criteria.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and exclusions
      description: What should the agent avoid changing?
  - type: dropdown
    id: preferred-agent
    attributes:
      label: Preferred agent
      options:
        - Codex
        - GitHub Copilot
        - Hermes
        - Claude
        - Human
        - No preference
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link related docs, PRs, issues, Vercel previews, or prior research.
